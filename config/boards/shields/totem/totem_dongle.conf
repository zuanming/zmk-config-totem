CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
CONFIG_ZMK_SLEEP=n
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Dongle Display configuration
CONFIG_ZMK_DISPLAY=y
CONFIG_SSD1306=y 
# CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n
